services:
  db:
    image: postgres:16-alpine
    container_name: maleo-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: maleo
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      TZ: Asia/Jakarta
      PGTZ: Asia/Jakarta
    command: ["postgres", "-c", "timezone=Asia/Jakarta"]
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d maleo"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: maleo-api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      TZ: Asia/Jakarta
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-24h}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?JWT_REFRESH_SECRET is required}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-30d}
      CLIENT_URL: ${CLIENT_URL:?CLIENT_URL is required}
      UPLOAD_DIR: ./uploads
    ports:
      - "4000:4000"
    volumes:
      - api_uploads:/app/uploads

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:?NEXT_PUBLIC_API_URL is required}
        # Passed at build time so next.config.mjs rewrites() can resolve the
        # API container name during 'npm run build' inside Docker.
        API_INTERNAL_URL: http://api:4000
    container_name: maleo-web
    restart: unless-stopped
    depends_on:
      - api
    environment:
      TZ: Asia/Jakarta
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:?NEXT_PUBLIC_API_URL is required}
      # Internal URL used by Next.js server-side rewrites to reach the API
      # container via Docker's internal network (not accessible to the browser).
      API_INTERNAL_URL: http://api:4000
    ports:
      - "3000:3000"

volumes:
  postgres_data:
  api_uploads:
