services:
  db:
    image: postgres:16-alpine
    container_name: maleo-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: maleo
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      TZ: Asia/Jakarta
      PGTZ: Asia/Jakarta
    command: ["postgres", "-c", "timezone=Asia/Jakarta"]
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d maleo"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: maleo-api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      TZ: Asia/Jakarta
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: postgresql://postgres:postgres@db:5432/maleo
      JWT_SECRET: replace_with_strong_secret_for_production
      JWT_EXPIRES_IN: 24h
      JWT_REFRESH_SECRET: replace_with_strong_refresh_secret_for_production
      JWT_REFRESH_EXPIRES_IN: 30d
      CLIENT_URL: http://localhost:3000
      UPLOAD_DIR: ./uploads
    ports:
      - "4000:4000"
    volumes:
      - api_uploads:/app/uploads

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:4000/api
    container_name: maleo-web
    restart: unless-stopped
    depends_on:
      - api
    environment:
      TZ: Asia/Jakarta
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: http://localhost:4000/api
    ports:
      - "3000:3000"

volumes:
  postgres_data:
  api_uploads:
